<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Card</title>
  <link rel="stylesheet" href="loginpage.css" />
</head>
<body>

  <div class="card">
    
    <div class="left">
      <div class="logo">🏠</div>
      <h1>Welcome home</h1>
      <p class="sub">Please enter your details.</p>

      <div class="field">
        <input type="email" placeholder="Email" />
        <span class="icon">✉️</span>
      </div>

      <div class="field">
        <input type="password" placeholder="Password" />
        <span class="icon">👁️</span>
      </div>

      <div class="row">
        <div class="check">
          <input type="checkbox" />
          <span>Remember for 30 days</span>
        </div>
        <a class="link" href="#">Forgot password?</a>
      </div>

      <button class="btn">Login</button>

      <div class="or">
        <span></span>
        <p>or</p>
        <span></span>
      </div>

      <div class="social">
        <button class="sbtn">I</button>
        <button class="sbtn">G</button>
        <button class="sbtn">f</button>
      </div>
    </div>

    
    <div class="right">
     
      
    </div>
  </div>

</body>
</html>
